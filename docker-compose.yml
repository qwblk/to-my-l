services:
  mysql:
    image: mysql:8.4
    container_name: to-my-l-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-to_my_l}
    command:
      - --default-time-zone=+08:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 不再挂 init.sql：表结构与数据由应用启动时 Flyway 接管。
      # 如果你需要本地开发"空库 + 初始数据"，把 V1__init_baseline.sql 的内容已经包含
      # 用户/日记/朋友圈等的表定义和种子用户，会在 Flyway 第一次运行时自动建好。
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - to-my-l

  redis:
    image: redis:7.2-alpine
    container_name: to-my-l-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - to-my-l

  app:
    build: .
    image: to-my-l-backend:latest
    container_name: to-my-l-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: ${SERVER_PORT:-8081}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-to_my_l}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      APP_UPLOAD_PATH: ${APP_UPLOAD_PATH:-/app/uploads}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
      MYBATIS_LOG_IMPL: ${MYBATIS_LOG_IMPL:-org.apache.ibatis.logging.nologging.NoLoggingImpl}
      JAVA_OPTS: ${JAVA_OPTS:-}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-false}
      # 已有库首次接入 Flyway 时设成"当前 schema 的版本号"。
      # 全新空库部署可以把它设成 0，让 Flyway 从 V1 开始顺序执行。
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
    ports:
      - "${SERVER_PORT:-8081}:8081"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - to-my-l

networks:
  to-my-l:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
