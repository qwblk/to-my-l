server:
  port: 8081

spring:

  # ---------- 文件上传 ----------
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ===========================
# 自定义
# ===========================
app:
  upload-path: ./uploads
  datasource:
    url: jdbc:mysql://192.168.126.130:3306/to_my_l?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: 192.168.126.130
      port: 6379
      password: 123456
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.panpeixue.myl.model.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  token-name: Authorization
  timeout: 604800
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: random-64
  is-log: false

logging:
  level:
    com.panpeixue.myl: debug